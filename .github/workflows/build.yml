name: Windows build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile TrueStretch
        shell: powershell
        run: |
          $csc = 'C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & $csc /nologo /target:winexe /platform:x64 /optimize+ /win32manifest:app.manifest /win32icon:assets\TrueStretch.ico /reference:System.dll /reference:System.Drawing.dll /reference:System.Windows.Forms.dll /out:dist\TrueStretch.exe TrueStretch.cs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-FileHash dist\TrueStretch.exe -Algorithm SHA256
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: TrueStretch-windows-x64
          path: dist/TrueStretch.exe
