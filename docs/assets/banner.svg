    <rect x="28" y="28" width="384" height="236" rx="12" fill="url(#screen)" opacity=".18"/>
    <path d="M66 215L145 154L218 183L298 92L374 124" fill="none" stroke="url(#screen)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
